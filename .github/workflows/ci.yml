name: CI

on:
  push:
    branches: [main, "feature/**", "fix/**"]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run tests
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          ORCHESTRATOR_MODEL: claude-sonnet-4-6
          SUBAGENT_MODEL: claude-haiku-4-5
        run: python -m pytest tests/ -x -q

  browser:
    # Real headless-Chromium e2e tests that drive the chat/cart JavaScript
    # lifecycle (Playwright). Kept in a SEPARATE job/process: the sync
    # Playwright greenlet contaminates the asyncio loop the unit suite relies
    # on, so `pytest tests/` deliberately excludes tests/browser (see
    # tests/conftest.py) and we invoke that path explicitly here. The server
    # boots OFFLINE + with test hooks, so no ANTHROPIC_API_KEY is needed.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements-dev.txt

      - name: Install Chromium for Playwright
        run: python -m playwright install --with-deps chromium

      - name: Run browser e2e tests
        run: python -m pytest tests/browser -q

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install ruff
        run: pip install ruff==0.15.15

      - name: Lint
        run: ruff check .

      - name: Format check
        run: ruff format --check .
