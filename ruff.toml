line-length = 100
target-version = "py39"

[lint]
# F841: unused variable — common in tests for readability/documentation
# E402: module not at top — intentional in web/routers/chat.py (conditional imports)
ignore = ["F841", "E402"]

[lint.per-file-ignores]
# Test files: unused variables are intentional (capture for assertion clarity)
"tests/**" = ["F841", "E741"]
# CLI display uses compact one-liner style intentionally
"cli/display.py" = ["E701", "E702"]
